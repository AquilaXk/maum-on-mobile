spring:
  application:
    name: maum-on-mobile-back
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD:}
    # 운영 기본값은 배포 env의 PostgreSQL URL과 맞춘다.
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
  mail:
    host: ${SPRING__MAIL__HOST:${SPRING_MAIL_HOST:}}
    port: ${SPRING__MAIL__PORT:${SPRING_MAIL_PORT:587}}
    username: ${SPRING__MAIL__USERNAME:${SPRING_MAIL_USERNAME:}}
    password: ${SPRING__MAIL__PASSWORD:${SPRING_MAIL_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: ${SPRING__MAIL__PROPERTIES__MAIL__SMTP__AUTH:${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}}
          starttls:
            enable: ${SPRING__MAIL__PROPERTIES__MAIL__SMTP__STARTTLS__ENABLE:${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}}
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  health:
    mail:
      # 메일 발송은 선택 기능이라 배포 readiness에서 제외한다.
      enabled: ${MANAGEMENT_HEALTH_MAIL_ENABLED:false}

app:
  auth:
    signup-email:
      ttl: ${APP_AUTH_SIGNUP_EMAIL_TTL:PT10M}
      max-active-requests: ${APP_AUTH_SIGNUP_EMAIL_MAX_ACTIVE_REQUESTS:3}
      max-failed-attempts: ${APP_AUTH_SIGNUP_EMAIL_MAX_FAILED_ATTEMPTS:5}
      hash-secret: ${APP_AUTH_SIGNUP_EMAIL_HASH_SECRET:${app.security.jwt.secret}}
      mail:
        enabled: ${CUSTOM__MEMBER__SIGNUP__MAIL_ENABLED:${SIGNUP_EMAIL_MAIL_ENABLED:false}}
        from: ${CUSTOM__MEMBER__SIGNUP__MAIL_FROM:${SIGNUP_EMAIL_MAIL_FROM:}}
        subject: ${CUSTOM__MEMBER__SIGNUP__MAIL_SUBJECT:${SIGNUP_EMAIL_MAIL_SUBJECT:[Maum On] 회원가입 이메일 인증}}
    oidc:
      enabled-providers: ${APP_AUTH_OIDC_ENABLED_PROVIDERS:}
      client-id: ${APP_AUTH_OIDC_CLIENT_ID:}
      provider-authorization-base-url: ${APP_AUTH_OIDC_PROVIDER_AUTHORIZATION_BASE_URL:}
      provider-token-base-url: ${APP_AUTH_OIDC_PROVIDER_TOKEN_BASE_URL:}
      provider-jwks-base-url: ${APP_AUTH_OIDC_PROVIDER_JWKS_BASE_URL:}
      provider-issuer-base-url: ${APP_AUTH_OIDC_PROVIDER_ISSUER_BASE_URL:}
      default-app-redirect-uri: ${APP_AUTH_OIDC_DEFAULT_APP_REDIRECT_URI:maumon://auth/callback}
      naver:
        authorization-uri: ${APP_AUTH_OIDC_NAVER_AUTHORIZATION_URI:}
        client-id: ${APP_AUTH_OIDC_NAVER_CLIENT_ID:}
        client-secret: ${APP_AUTH_OIDC_NAVER_CLIENT_SECRET:}
        scope: ${APP_AUTH_OIDC_NAVER_SCOPE:}
        token-uri: ${APP_AUTH_OIDC_NAVER_TOKEN_URI:}
        jwks-uri: ${APP_AUTH_OIDC_NAVER_JWKS_URI:}
        issuer: ${APP_AUTH_OIDC_NAVER_ISSUER:}
      kakao:
        authorization-uri: ${APP_AUTH_OIDC_KAKAO_AUTHORIZATION_URI:}
        client-id: ${APP_AUTH_OIDC_KAKAO_CLIENT_ID:}
        client-secret: ${APP_AUTH_OIDC_KAKAO_CLIENT_SECRET:}
        scope: ${APP_AUTH_OIDC_KAKAO_SCOPE:openid}
        token-uri: ${APP_AUTH_OIDC_KAKAO_TOKEN_URI:}
        jwks-uri: ${APP_AUTH_OIDC_KAKAO_JWKS_URI:}
        issuer: ${APP_AUTH_OIDC_KAKAO_ISSUER:}
      facebook:
        authorization-uri: ${APP_AUTH_OIDC_FACEBOOK_AUTHORIZATION_URI:}
        client-id: ${APP_AUTH_OIDC_FACEBOOK_CLIENT_ID:}
        client-secret: ${APP_AUTH_OIDC_FACEBOOK_CLIENT_SECRET:}
        scope: ${APP_AUTH_OIDC_FACEBOOK_SCOPE:openid email public_profile}
        token-uri: ${APP_AUTH_OIDC_FACEBOOK_TOKEN_URI:}
        jwks-uri: ${APP_AUTH_OIDC_FACEBOOK_JWKS_URI:}
        issuer: ${APP_AUTH_OIDC_FACEBOOK_ISSUER:}
      google:
        authorization-uri: ${APP_AUTH_OIDC_GOOGLE_AUTHORIZATION_URI:}
        client-id: ${APP_AUTH_OIDC_GOOGLE_CLIENT_ID:}
        client-secret: ${APP_AUTH_OIDC_GOOGLE_CLIENT_SECRET:}
        scope: ${APP_AUTH_OIDC_GOOGLE_SCOPE:openid email profile}
        token-uri: ${APP_AUTH_OIDC_GOOGLE_TOKEN_URI:}
        jwks-uri: ${APP_AUTH_OIDC_GOOGLE_JWKS_URI:}
        issuer: ${APP_AUTH_OIDC_GOOGLE_ISSUER:}
      apple:
        authorization-uri: ${APP_AUTH_OIDC_APPLE_AUTHORIZATION_URI:https://appleid.apple.com/auth/authorize}
        client-id: ${APP_AUTH_OIDC_APPLE_CLIENT_ID:}
        client-secret: ${APP_AUTH_OIDC_APPLE_CLIENT_SECRET:}
        scope: ${APP_AUTH_OIDC_APPLE_SCOPE:name email}
        token-uri: ${APP_AUTH_OIDC_APPLE_TOKEN_URI:https://appleid.apple.com/auth/token}
        jwks-uri: ${APP_AUTH_OIDC_APPLE_JWKS_URI:https://appleid.apple.com/auth/keys}
        issuer: ${APP_AUTH_OIDC_APPLE_ISSUER:https://appleid.apple.com}
  security:
    jwt:
      issuer: maum-on-mobile
      secret: ${APP_JWT_SECRET}
      access-token-ttl: PT1H
    rate-limit:
      enabled: ${APP_SECURITY_RATE_LIMIT_ENABLED:true}
      capacity: ${APP_SECURITY_RATE_LIMIT_CAPACITY:600}
      window: ${APP_SECURITY_RATE_LIMIT_WINDOW:PT1M}
      client-ip-header: ${APP_SECURITY_RATE_LIMIT_CLIENT_IP_HEADER:}
      excluded-paths:
        - /api/health
        - /actuator/health
    cors:
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:}
      allowed-origin-patterns: ${APP_SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
      max-age: ${APP_SECURITY_CORS_MAX_AGE:PT1H}
  notifications:
    push:
      request-timeout: ${PUSH_REQUEST_TIMEOUT:PT5S}
      retry:
        max-attempts: ${PUSH_RETRY_MAX_ATTEMPTS:2}
      fcm:
        project-id: ${PUSH_FCM_PROJECT_ID:}
        access-token: ${PUSH_FCM_ACCESS_TOKEN:}
        endpoint: ${PUSH_FCM_ENDPOINT:https://fcm.googleapis.com/v1/projects/{projectId}/messages:send}
      apns:
        topic: ${PUSH_APNS_TOPIC:}
        authorization-token: ${PUSH_APNS_AUTHORIZATION_TOKEN:}
        endpoint: ${PUSH_APNS_ENDPOINT:https://api.push.apple.com/3/device/{deviceToken}}
  consultation:
    ai:
      timeout: ${CONSULTATION_AI_TIMEOUT:PT8S}
  moderation:
    ai:
      timeout: ${MODERATION_AI_TIMEOUT:PT4S}
  ai:
    vertex:
      project-id: ${GOOGLE_CLOUD_PROJECT_ID:}
      location: ${VERTEX_AI_LOCATION:us-central1}
      model: ${VERTEX_AI_MODEL:gemini-2.5-flash}
      credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS:}
    circuit-breaker:
      failure-threshold: ${AI_CIRCUIT_FAILURE_THRESHOLD:3}
      open-duration: ${AI_CIRCUIT_OPEN_DURATION:PT1M}
    consultation:
      endpoint: ${AI_CONSULTATION_ENDPOINT:}
      authorization-token: ${AI_CONSULTATION_AUTHORIZATION_TOKEN:}
      model: ${AI_CONSULTATION_MODEL:gemini-2.5-flash}
      request-timeout: ${AI_CONSULTATION_REQUEST_TIMEOUT:PT8S}
      max-attempts: ${AI_CONSULTATION_MAX_ATTEMPTS:2}
      max-input-chars: ${AI_CONSULTATION_MAX_INPUT_CHARS:2000}
      recent-message-limit: ${AI_CONSULTATION_RECENT_MESSAGE_LIMIT:10}
      prompt-mode: ${AI_CONSULTATION_PROMPT_MODE:verbose}
      max-prompt-chars: ${AI_CONSULTATION_MAX_PROMPT_CHARS:12000}
      max-output-tokens: ${AI_CONSULTATION_MAX_OUTPUT_TOKENS:1536}
      thinking-budget: ${AI_CONSULTATION_THINKING_BUDGET:1024}
    moderation:
      endpoint: ${AI_MODERATION_ENDPOINT:}
      authorization-token: ${AI_MODERATION_AUTHORIZATION_TOKEN:}
      model: ${AI_MODERATION_MODEL:gemini-2.5-flash}
      request-timeout: ${AI_MODERATION_REQUEST_TIMEOUT:PT4S}
      max-attempts: ${AI_MODERATION_MAX_ATTEMPTS:2}
      max-input-chars: ${AI_MODERATION_MAX_INPUT_CHARS:2000}
      recent-message-limit: 0
  store-review:
    seed:
      enabled: ${MAUMON_STORE_REVIEW_SEED_ENABLED:false}
      secret: ${MAUMON_STORE_REVIEW_SEED_SECRET:}
      reviewer:
        email: ${MAUMON_REVIEW_ACCOUNT_EMAIL:}
        password: ${MAUMON_REVIEW_ACCOUNT_PASSWORD:}
      operations:
        email: ${MAUMON_REVIEW_OPERATIONS_EMAIL:}
        password: ${MAUMON_REVIEW_OPERATIONS_PASSWORD:}
