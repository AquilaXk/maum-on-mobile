spring:
  application:
    name: maum-on-mobile-back
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  security:
    jwt:
      issuer: maum-on-mobile
      secret: ${APP_JWT_SECRET}
      access-token-ttl: PT1H
  notifications:
    push:
      request-timeout: ${PUSH_REQUEST_TIMEOUT:PT5S}
      retry:
        max-attempts: ${PUSH_RETRY_MAX_ATTEMPTS:2}
      fcm:
        project-id: ${PUSH_FCM_PROJECT_ID:}
        access-token: ${PUSH_FCM_ACCESS_TOKEN:}
        endpoint: ${PUSH_FCM_ENDPOINT:https://fcm.googleapis.com/v1/projects/{projectId}/messages:send}
      apns:
        topic: ${PUSH_APNS_TOPIC:}
        authorization-token: ${PUSH_APNS_AUTHORIZATION_TOKEN:}
        endpoint: ${PUSH_APNS_ENDPOINT:https://api.push.apple.com/3/device/{deviceToken}}
  consultation:
    ai:
      timeout: ${CONSULTATION_AI_TIMEOUT:PT8S}
  moderation:
    ai:
      timeout: ${MODERATION_AI_TIMEOUT:PT4S}
  ai:
    vertex:
      project-id: ${GOOGLE_CLOUD_PROJECT_ID:}
      location: ${VERTEX_AI_LOCATION:us-central1}
      model: ${VERTEX_AI_MODEL:gemini-2.5-flash}
      credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS:}
    circuit-breaker:
      failure-threshold: ${AI_CIRCUIT_FAILURE_THRESHOLD:3}
      open-duration: ${AI_CIRCUIT_OPEN_DURATION:PT1M}
    consultation:
      endpoint: ${AI_CONSULTATION_ENDPOINT:}
      authorization-token: ${AI_CONSULTATION_AUTHORIZATION_TOKEN:}
      model: ${AI_CONSULTATION_MODEL:gemini-2.5-flash}
      request-timeout: ${AI_CONSULTATION_REQUEST_TIMEOUT:PT5S}
      max-attempts: ${AI_CONSULTATION_MAX_ATTEMPTS:2}
      max-input-chars: ${AI_CONSULTATION_MAX_INPUT_CHARS:1000}
      recent-message-limit: ${AI_CONSULTATION_RECENT_MESSAGE_LIMIT:6}
    moderation:
      endpoint: ${AI_MODERATION_ENDPOINT:}
      authorization-token: ${AI_MODERATION_AUTHORIZATION_TOKEN:}
      model: ${AI_MODERATION_MODEL:gemini-2.5-flash}
      request-timeout: ${AI_MODERATION_REQUEST_TIMEOUT:PT4S}
      max-attempts: ${AI_MODERATION_MAX_ATTEMPTS:2}
      max-input-chars: ${AI_MODERATION_MAX_INPUT_CHARS:2000}
      recent-message-limit: 0
  store-review:
    seed:
      enabled: ${MAUMON_STORE_REVIEW_SEED_ENABLED:false}
      secret: ${MAUMON_STORE_REVIEW_SEED_SECRET:}
      reviewer:
        email: ${MAUMON_REVIEW_ACCOUNT_EMAIL:}
        password: ${MAUMON_REVIEW_ACCOUNT_PASSWORD:}
      operations:
        email: ${MAUMON_REVIEW_OPERATIONS_EMAIL:}
        password: ${MAUMON_REVIEW_OPERATIONS_PASSWORD:}
