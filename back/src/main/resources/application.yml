spring:
  application:
    name: maum-on-mobile-back
  datasource:
    url: jdbc:h2:file:./data/maum-on-mobile;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  security:
    jwt:
      issuer: maum-on-mobile
      secret: ${APP_JWT_SECRET}
      access-token-ttl: PT1H
