spring:
  datasource:
    url: jdbc:h2:mem:maumonmobile-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true

app:
  security:
    jwt:
      issuer: maum-on-mobile-test
      secret: test-local-change-me-change-me-change-me
      access-token-ttl: PT10M
  images:
    local:
      root: ./build/test-images
      public-base-path: /images/uploads
    cleanup-fixed-delay-ms: 86400000
