name: Deploy OCI A1 Backend

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub deployment environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      image_tag_suffix:
        description: "Optional image tag suffix"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-oci-a1-backend-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve deploy context
    runs-on: ubuntu-latest
    outputs:
      backend_image_tag: ${{ steps.context.outputs.backend_image_tag }}
      deploy_sha: ${{ steps.context.outputs.deploy_sha }}
      environment: ${{ steps.context.outputs.environment }}
      image_tag_suffix: ${{ steps.context.outputs.image_tag_suffix }}
      should_deploy: ${{ steps.context.outputs.should_deploy }}
      skip_reason: ${{ steps.context.outputs.skip_reason }}

    steps:
      - name: Checkout deploy ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve deploy context
        id: context
        shell: bash
        env:
          DISPATCH_ENVIRONMENT: ${{ inputs.environment }}
          DISPATCH_IMAGE_TAG_SUFFIX: ${{ inputs.image_tag_suffix }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          event_name="${GITHUB_EVENT_NAME}"
          deploy_environment="${DISPATCH_ENVIRONMENT:-staging}"
          image_tag_suffix="${DISPATCH_IMAGE_TAG_SUFFIX:-}"
          should_deploy="true"
          skip_reason=""

          if [[ "${event_name}" == "workflow_run" ]]; then
            deploy_environment="staging"
            image_tag_suffix=""
            deploy_sha="${WORKFLOW_RUN_HEAD_SHA}"
            if [[ "${WORKFLOW_RUN_CONCLUSION}" != "success" ]]; then
              should_deploy="false"
              skip_reason="CI conclusion is ${WORKFLOW_RUN_CONCLUSION}"
            elif [[ "${WORKFLOW_RUN_HEAD_BRANCH}" != "main" ]]; then
              should_deploy="false"
              skip_reason="CI head branch is ${WORKFLOW_RUN_HEAD_BRANCH}"
            fi
          else
            deploy_sha="$(git rev-parse HEAD)"
          fi

          git fetch --no-tags origin main:refs/remotes/origin/main
          main_sha="$(git rev-parse origin/main)"

          if [[ "${event_name}" == "workflow_run" && "${should_deploy}" == "true" && "${deploy_sha}" != "${main_sha}" ]]; then
            should_deploy="false"
            skip_reason="stale deployment SHA ${deploy_sha} does not match origin/main ${main_sha}"
          fi

          if [[ "${event_name}" == "workflow_run" && "${should_deploy}" == "true" ]]; then
            changed_files="$(mktemp)"
            if git rev-parse "${deploy_sha}^" >/dev/null 2>&1; then
              git diff --name-only "${deploy_sha}^" "${deploy_sha}" >"${changed_files}"
            else
              git diff-tree --no-commit-id --name-only -r "${deploy_sha}" >"${changed_files}"
            fi

            gate_output="$(GITHUB_OUTPUT= GITHUB_STEP_SUMMARY= bash tools/ci/detect-changed-paths.sh "${changed_files}")"
            backend_changed="$(printf '%s\n' "${gate_output}" | awk -F= '$1 == "backend" { print $2 }')"
            if [[ "${backend_changed}" != "true" ]]; then
              should_deploy="false"
              skip_reason="no backend deployment-impacting files changed"
            fi
          fi

          backend_image_tag="maum-on-mobile-back:${deploy_sha}${image_tag_suffix}"

          {
            echo "backend_image_tag=${backend_image_tag}"
            echo "deploy_sha=${deploy_sha}"
            echo "environment=${deploy_environment}"
            echo "image_tag_suffix=${image_tag_suffix}"
            echo "should_deploy=${should_deploy}"
            echo "skip_reason=${skip_reason}"
          } >>"${GITHUB_OUTPUT}"

          {
            echo "### OCI A1 backend deploy context"
            echo
            echo "| key | value |"
            echo "| --- | --- |"
            echo "| event | ${event_name} |"
            echo "| deploy_sha | ${deploy_sha} |"
            echo "| origin/main | ${main_sha} |"
            echo "| environment | ${deploy_environment} |"
            echo "| should_deploy | ${should_deploy} |"
            if [[ -n "${skip_reason}" ]]; then
              echo "| skip_reason | ${skip_reason} |"
            fi
          } >>"${GITHUB_STEP_SUMMARY}"

  noop:
    name: Explain skipped deployment
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_deploy != 'true'

    steps:
      - name: Write skip summary
        shell: bash
        run: |
          {
            echo "### OCI A1 backend deploy skipped"
            echo
            echo "${{ needs.prepare.outputs.skip_reason }}"
          } >>"${GITHUB_STEP_SUMMARY}"

  deploy:
    name: Deploy backend runtime
    needs: prepare
    if: needs.prepare.outputs.should_deploy == 'true'
    runs-on:
      - self-hosted
      - Linux
      - ARM64
      - oci-a1-deploy
    environment:
      name: ${{ needs.prepare.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.prepare.outputs.deploy_sha }}
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build backend jar
        working-directory: back
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon test bootJar

      - name: Package deployment bundle
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build/deploy-oci-a1
          mkdir -p build/deploy-oci-a1
          boot_jar="$(find back/build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' | sort | tail -n 1)"
          if [[ -z "${boot_jar}" ]]; then
            echo "Backend boot jar not found" >&2
            exit 1
          fi
          cp "${boot_jar}" build/deploy-oci-a1/maum-on-mobile-back.jar
          cp back/Dockerfile build/deploy-oci-a1/Dockerfile
          tar -czf build/maum-on-mobile-backend-bundle.tar.gz -C build/deploy-oci-a1 .

      - name: Compose backend env
        shell: bash
        env:
          OCI_A1_BACKEND_ENV_B64: ${{ secrets.OCI_A1_BACKEND_ENV_B64 }}
          SPRING__MAIL__HOST: ${{ secrets.SPRING__MAIL__HOST }}
          SPRING__MAIL__PORT: ${{ secrets.SPRING__MAIL__PORT }}
          SPRING__MAIL__USERNAME: ${{ secrets.SPRING__MAIL__USERNAME }}
          SPRING__MAIL__PASSWORD: ${{ secrets.SPRING__MAIL__PASSWORD }}
          SPRING__MAIL__PROPERTIES__MAIL__SMTP__AUTH: ${{ secrets.SPRING__MAIL__PROPERTIES__MAIL__SMTP__AUTH }}
          SPRING__MAIL__PROPERTIES__MAIL__SMTP__STARTTLS__ENABLE: ${{ secrets.SPRING__MAIL__PROPERTIES__MAIL__SMTP__STARTTLS__ENABLE }}
          CUSTOM__MEMBER__SIGNUP__MAIL_ENABLED: ${{ secrets.CUSTOM__MEMBER__SIGNUP__MAIL_ENABLED }}
          CUSTOM__MEMBER__SIGNUP__MAIL_FROM: ${{ secrets.CUSTOM__MEMBER__SIGNUP__MAIL_FROM }}
          CUSTOM__MEMBER__SIGNUP__MAIL_SUBJECT: ${{ secrets.CUSTOM__MEMBER__SIGNUP__MAIL_SUBJECT }}
          APP_AUTH_SIGNUP_EMAIL_HASH_SECRET: ${{ secrets.APP_AUTH_SIGNUP_EMAIL_HASH_SECRET }}
        run: |
          set -euo pipefail

          backend_env="${RUNNER_TEMP}/maum-on-mobile-backend.env"
          printf '%s' "${OCI_A1_BACKEND_ENV_B64}" | base64 --decode >"${backend_env}"

          if [[ -n "${SPRING__MAIL__HOST:-}" && -n "${CUSTOM__MEMBER__SIGNUP__MAIL_FROM:-}" && -z "${CUSTOM__MEMBER__SIGNUP__MAIL_ENABLED:-}" ]]; then
            CUSTOM__MEMBER__SIGNUP__MAIL_ENABLED=true
          fi

          append_or_replace_env() {
            local key="$1"
            local value="${!key:-}"
            local tmp_env

            if [[ -z "${value}" ]]; then
              return
            fi

            tmp_env="$(mktemp)"
            awk -v key="${key}" -v value="${value}" '
              BEGIN { prefix = key "="; replaced = 0 }
              index($0, prefix) == 1 { print key "=" value; replaced = 1; next }
              { print }
              END { if (replaced == 0) print key "=" value }
            ' "${backend_env}" >"${tmp_env}"
            mv "${tmp_env}" "${backend_env}"
          }

          for name in \
            SPRING__MAIL__HOST \
            SPRING__MAIL__PORT \
            SPRING__MAIL__USERNAME \
            SPRING__MAIL__PASSWORD \
            SPRING__MAIL__PROPERTIES__MAIL__SMTP__AUTH \
            SPRING__MAIL__PROPERTIES__MAIL__SMTP__STARTTLS__ENABLE \
            CUSTOM__MEMBER__SIGNUP__MAIL_ENABLED \
            CUSTOM__MEMBER__SIGNUP__MAIL_FROM \
            CUSTOM__MEMBER__SIGNUP__MAIL_SUBJECT \
            APP_AUTH_SIGNUP_EMAIL_HASH_SECRET
          do
            append_or_replace_env "${name}"
          done

          {
            echo "OCI_A1_BACKEND_ENV_B64_COMPOSED<<EOF"
            base64 <"${backend_env}" | tr -d '\n'
            echo
            echo "EOF"
          } >>"${GITHUB_ENV}"

      - name: Deploy on server runner
        shell: bash
        env:
          MAUMON_DEPLOY_TRANSPORT: local
          OCI_A1_BACKEND_ENV_B64: ${{ env.OCI_A1_BACKEND_ENV_B64_COMPOSED }}
          OCI_A1_VERTEX_KEY_JSON_B64: ${{ secrets.OCI_A1_VERTEX_KEY_JSON_B64 }}
          MAUMON_BACKEND_BUNDLE_PATH: build/maum-on-mobile-backend-bundle.tar.gz
          MAUMON_BACKEND_IMAGE_TAG: ${{ needs.prepare.outputs.backend_image_tag }}
        run: bash tools/deploy/deploy-oci-a1-backend.sh
