name: Deploy OCI A1 Backend

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run deployment checks without changing the running backend"
        required: true
        type: boolean
        default: true
      ref:
        description: "Optional branch, tag, or SHA to deploy for manual dry-runs"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-oci-a1-backend
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve deploy context
    runs-on: ubuntu-latest
    outputs:
      backend_image_tag: ${{ steps.context.outputs.backend_image_tag }}
      deploy_sha: ${{ steps.context.outputs.deploy_sha }}
      deploy_reason: ${{ steps.context.outputs.deploy_reason }}
      dry_run: ${{ steps.context.outputs.dry_run }}
      environment: ${{ steps.context.outputs.environment }}
      short_sha: ${{ steps.context.outputs.short_sha }}
      should_deploy: ${{ steps.context.outputs.should_deploy }}
      skip_reason: ${{ steps.context.outputs.skip_reason }}

    steps:
      - name: Checkout deploy ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.ref || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve deploy context
        id: context
        shell: bash
        env:
          DISPATCH_DRY_RUN: ${{ inputs.dry_run }}
          DISPATCH_REF: ${{ inputs.ref }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          event_name="${GITHUB_EVENT_NAME}"
          deploy_environment="production"
          deploy_reason="manual dry-run"
          dry_run="true"
          should_deploy="true"
          skip_reason=""

          if [[ "${event_name}" == "workflow_run" ]]; then
            deploy_reason="main CI completed successfully"
            dry_run="false"
            deploy_sha="${WORKFLOW_RUN_HEAD_SHA}"
            if [[ "${WORKFLOW_RUN_CONCLUSION}" != "success" ]]; then
              should_deploy="false"
              skip_reason="CI conclusion is ${WORKFLOW_RUN_CONCLUSION}"
            elif [[ "${WORKFLOW_RUN_HEAD_BRANCH}" != "main" ]]; then
              should_deploy="false"
              skip_reason="CI head branch is ${WORKFLOW_RUN_HEAD_BRANCH}"
            fi
          else
            dry_run="${DISPATCH_DRY_RUN:-true}"
            if [[ -n "${DISPATCH_REF:-}" ]]; then
              if git rev-parse --verify "${DISPATCH_REF}^{commit}" >/dev/null 2>&1; then
                deploy_sha="$(git rev-parse "${DISPATCH_REF}^{commit}")"
              else
                git fetch --no-tags origin "${DISPATCH_REF}"
                deploy_sha="$(git rev-parse FETCH_HEAD)"
              fi
            else
              deploy_sha="$(git rev-parse HEAD)"
            fi

            if [[ "${dry_run}" == "true" ]]; then
              deploy_reason="manual dry-run"
            else
              deploy_reason="manual deploy"
            fi
          fi

          if [[ ! "${dry_run}" =~ ^(true|false)$ ]]; then
            echo "Invalid dry_run value: ${dry_run}" >&2
            exit 1
          fi

          git fetch --no-tags origin main:refs/remotes/origin/main
          main_sha="$(git rev-parse origin/main)"

          if [[ "${dry_run}" != "true" && "${should_deploy}" == "true" && "${deploy_sha}" != "${main_sha}" ]]; then
            should_deploy="false"
            skip_reason="stale deployment SHA ${deploy_sha} does not match origin/main ${main_sha}"
          fi

          if [[ "${event_name}" == "workflow_run" && "${should_deploy}" == "true" ]]; then
            changed_files="$(mktemp)"
            if git rev-parse "${deploy_sha}^" >/dev/null 2>&1; then
              git diff --name-only "${deploy_sha}^" "${deploy_sha}" >"${changed_files}"
            else
              git diff-tree --no-commit-id --name-only -r "${deploy_sha}" >"${changed_files}"
            fi

            gate_output="$(env -u GITHUB_OUTPUT -u GITHUB_STEP_SUMMARY bash tools/ci/detect-changed-paths.sh "${changed_files}")"
            deploy_changed="$(printf '%s\n' "${gate_output}" | awk -F= '$1 == "deploy" { print $2 }')"

            {
              echo "### Deployment impact"
              echo
              echo "| key | value |"
              echo "| --- | --- |"
              echo "| deploy_changed | ${deploy_changed:-false} |"
              echo
              echo "#### Changed files"
              sed 's/^/- `/' "${changed_files}" | sed 's/$/`/'
            } >>"${GITHUB_STEP_SUMMARY}"

            if [[ "${deploy_changed}" != "true" ]]; then
              should_deploy="false"
              skip_reason="no deployment-impacting files changed"
            fi
          fi

          short_sha="${deploy_sha:0:12}"
          backend_image_tag="maum-on-mobile-back:${deploy_sha}"

          {
            echo "backend_image_tag=${backend_image_tag}"
            echo "deploy_sha=${deploy_sha}"
            echo "deploy_reason=${deploy_reason}"
            echo "dry_run=${dry_run}"
            echo "environment=${deploy_environment}"
            echo "short_sha=${short_sha}"
            echo "should_deploy=${should_deploy}"
            echo "skip_reason=${skip_reason}"
          } >>"${GITHUB_OUTPUT}"

          {
            echo "### OCI A1 backend deploy context"
            echo
            echo "| key | value |"
            echo "| --- | --- |"
            echo "| event | ${event_name} |"
            echo "| deploy_sha | ${deploy_sha} |"
            echo "| short_sha | ${short_sha} |"
            echo "| origin/main | ${main_sha} |"
            echo "| environment | ${deploy_environment} |"
            echo "| dry_run | ${dry_run} |"
            echo "| should_deploy | ${should_deploy} |"
            if [[ "${should_deploy}" == "true" ]]; then
              echo "| deploy_reason | ${deploy_reason} |"
            fi
            if [[ -n "${skip_reason}" ]]; then
              echo "| skip_reason | ${skip_reason} |"
            fi
          } >>"${GITHUB_STEP_SUMMARY}"

  noop:
    name: Explain skipped deployment
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_deploy != 'true'

    steps:
      - name: Write skip summary
        shell: bash
        run: |
          {
            echo "### OCI A1 backend deploy skipped"
            echo
            echo "${{ needs.prepare.outputs.skip_reason }}"
          } >>"${GITHUB_STEP_SUMMARY}"

  deploy:
    name: Deploy backend runtime
    needs: prepare
    if: needs.prepare.outputs.should_deploy == 'true'
    runs-on:
      - self-hosted
      - Linux
      - ARM64
      - oci-a1-deploy
    environment:
      name: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      # Records GitHub Deployment statuses only from the actual server deploy job.
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.prepare.outputs.deploy_sha }}
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build backend jar
        working-directory: back
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon test bootJar

      - name: Package deployment bundle
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build/deploy-oci-a1
          mkdir -p build/deploy-oci-a1
          boot_jar="$(find back/build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' | sort | tail -n 1)"
          if [[ -z "${boot_jar}" ]]; then
            echo "Backend boot jar not found" >&2
            exit 1
          fi
          cp "${boot_jar}" build/deploy-oci-a1/maum-on-mobile-back.jar
          cp back/Dockerfile build/deploy-oci-a1/Dockerfile
          tar -czf build/maum-on-mobile-backend-bundle.tar.gz -C build/deploy-oci-a1 .

      - name: Compose backend env
        shell: bash
        env:
          OCI_A1_BACKEND_ENV_B64: ${{ secrets.OCI_A1_BACKEND_ENV_B64 }}
          SPRING__MAIL__HOST: ${{ secrets.SPRING__MAIL__HOST }}
          SPRING__MAIL__PORT: ${{ secrets.SPRING__MAIL__PORT }}
          SPRING__MAIL__USERNAME: ${{ secrets.SPRING__MAIL__USERNAME }}
          SPRING__MAIL__PASSWORD: ${{ secrets.SPRING__MAIL__PASSWORD }}
          SPRING__MAIL__PROPERTIES__MAIL__SMTP__AUTH: ${{ secrets.SPRING__MAIL__PROPERTIES__MAIL__SMTP__AUTH }}
          SPRING__MAIL__PROPERTIES__MAIL__SMTP__STARTTLS__ENABLE: ${{ secrets.SPRING__MAIL__PROPERTIES__MAIL__SMTP__STARTTLS__ENABLE }}
          CUSTOM__MEMBER__SIGNUP__MAIL_ENABLED: ${{ secrets.CUSTOM__MEMBER__SIGNUP__MAIL_ENABLED }}
          CUSTOM__MEMBER__SIGNUP__MAIL_FROM: ${{ secrets.CUSTOM__MEMBER__SIGNUP__MAIL_FROM }}
          CUSTOM__MEMBER__SIGNUP__MAIL_SUBJECT: ${{ secrets.CUSTOM__MEMBER__SIGNUP__MAIL_SUBJECT }}
          APP_AUTH_SIGNUP_EMAIL_HASH_SECRET: ${{ secrets.APP_AUTH_SIGNUP_EMAIL_HASH_SECRET }}
        run: |
          set -euo pipefail

          backend_env="${RUNNER_TEMP}/maum-on-mobile-backend.env"
          printf '%s' "${OCI_A1_BACKEND_ENV_B64}" | base64 --decode >"${backend_env}"

          if [[ -n "${SPRING__MAIL__HOST:-}" && -n "${CUSTOM__MEMBER__SIGNUP__MAIL_FROM:-}" && -z "${CUSTOM__MEMBER__SIGNUP__MAIL_ENABLED:-}" ]]; then
            CUSTOM__MEMBER__SIGNUP__MAIL_ENABLED=true
          fi

          append_or_replace_env() {
            local key="$1"
            local value="${!key:-}"
            local tmp_env

            if [[ -z "${value}" ]]; then
              return
            fi

            tmp_env="$(mktemp)"
            awk -v key="${key}" -v value="${value}" '
              BEGIN { prefix = key "="; replaced = 0 }
              index($0, prefix) == 1 { print key "=" value; replaced = 1; next }
              { print }
              END { if (replaced == 0) print key "=" value }
            ' "${backend_env}" >"${tmp_env}"
            mv "${tmp_env}" "${backend_env}"
          }

          for name in \
            SPRING__MAIL__HOST \
            SPRING__MAIL__PORT \
            SPRING__MAIL__USERNAME \
            SPRING__MAIL__PASSWORD \
            SPRING__MAIL__PROPERTIES__MAIL__SMTP__AUTH \
            SPRING__MAIL__PROPERTIES__MAIL__SMTP__STARTTLS__ENABLE \
            CUSTOM__MEMBER__SIGNUP__MAIL_ENABLED \
            CUSTOM__MEMBER__SIGNUP__MAIL_FROM \
            CUSTOM__MEMBER__SIGNUP__MAIL_SUBJECT \
            APP_AUTH_SIGNUP_EMAIL_HASH_SECRET
          do
            append_or_replace_env "${name}"
          done

          {
            echo "OCI_A1_BACKEND_ENV_B64_COMPOSED<<EOF"
            base64 <"${backend_env}" | tr -d '\n'
            echo
            echo "EOF"
          } >>"${GITHUB_ENV}"

      - name: Prepare deploy diagnostics
        if: always()
        shell: bash
        run: mkdir -p deploy-debug

      - name: Run preflight diagnostics
        if: needs.prepare.outputs.dry_run != 'true'
        continue-on-error: true
        shell: bash
        run: |
          bash tools/deploy/collect-oci-a1-deploy-diagnostics.sh \
            --phase before \
            --output-dir deploy-debug \
            --image "${{ needs.prepare.outputs.backend_image_tag }}"

      - name: Create GitHub deployment
        id: deployment
        if: needs.prepare.outputs.dry_run != 'true'
        shell: bash
        env:
          DEPLOY_ENVIRONMENT: ${{ needs.prepare.outputs.environment }}
          DEPLOY_SHA: ${{ needs.prepare.outputs.deploy_sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          api_url="${GITHUB_API_URL:-https://api.github.com}"
          deployment_payload="$(printf '{"ref":"%s","environment":"%s","description":"OCI A1 backend deployment","auto_merge":false,"required_contexts":[]}' "${DEPLOY_SHA}" "${DEPLOY_ENVIRONMENT}")"
          deployment_response="$(
            curl -fsSL \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api_url}/repos/${GITHUB_REPOSITORY}/deployments" \
              -d "${deployment_payload}"
          )"
          deployment_id="$(printf '%s' "${deployment_response}" | grep -m1 -Eo '"id":[[:space:]]*[0-9]+' | grep -Eo '[0-9]+' || true)"
          if [[ -z "${deployment_id}" ]]; then
            echo "GitHub deployment id not found in API response" >&2
            exit 1
          fi
          echo "deployment_id=${deployment_id}" >>"${GITHUB_OUTPUT}"

          status_payload='{"state":"in_progress","description":"OCI A1 backend deployment started","auto_inactive":false}'
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api_url}/repos/${GITHUB_REPOSITORY}/deployments/${deployment_id}/statuses" \
            -d "${status_payload}" >/dev/null

      - name: Deploy on server runner
        id: deploy_run
        if: needs.prepare.outputs.dry_run != 'true'
        shell: bash
        env:
          MAUMON_DEPLOY_TRANSPORT: local
          OCI_A1_BACKEND_ENV_B64: ${{ env.OCI_A1_BACKEND_ENV_B64_COMPOSED }}
          OCI_A1_VERTEX_KEY_JSON_B64: ${{ secrets.OCI_A1_VERTEX_KEY_JSON_B64 }}
          MAUMON_BACKEND_BUNDLE_PATH: build/maum-on-mobile-backend-bundle.tar.gz
          MAUMON_BACKEND_IMAGE_TAG: ${{ needs.prepare.outputs.backend_image_tag }}
        run: bash tools/deploy/deploy-oci-a1-backend.sh

      - name: Run postflight diagnostics
        if: steps.deploy_run.outcome == 'success' && needs.prepare.outputs.dry_run != 'true'
        continue-on-error: true
        shell: bash
        run: |
          bash tools/deploy/collect-oci-a1-deploy-diagnostics.sh \
            --phase after \
            --output-dir deploy-debug \
            --image "${{ needs.prepare.outputs.backend_image_tag }}"

      - name: Collect failure diagnostics
        if: failure() && needs.prepare.outputs.dry_run != 'true'
        continue-on-error: true
        shell: bash
        run: |
          bash tools/deploy/collect-oci-a1-deploy-diagnostics.sh \
            --phase failure \
            --output-dir deploy-debug \
            --image "${{ needs.prepare.outputs.backend_image_tag }}"

      - name: Write dry-run summary
        if: needs.prepare.outputs.dry_run == 'true'
        shell: bash
        run: |
          {
            echo "### OCI A1 backend deploy dry-run completed"
            echo
            echo "Build, bundle, and runtime env composition completed without changing the running backend."
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Mark deployment success
        if: steps.deploy_run.outcome == 'success' && steps.deployment.outputs.deployment_id != ''
        continue-on-error: true
        shell: bash
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          api_url="${GITHUB_API_URL:-https://api.github.com}"
          status_payload='{"state":"success","description":"OCI A1 backend deployment completed","auto_inactive":true}'
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api_url}/repos/${GITHUB_REPOSITORY}/deployments/${DEPLOYMENT_ID}/statuses" \
            -d "${status_payload}" >/dev/null

      - name: Mark deployment failure
        if: failure() && steps.deploy_run.outcome == 'failure' && steps.deployment.outputs.deployment_id != ''
        shell: bash
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          api_url="${GITHUB_API_URL:-https://api.github.com}"
          status_payload='{"state":"failure","description":"OCI A1 backend deployment failed","auto_inactive":false}'
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api_url}/repos/${GITHUB_REPOSITORY}/deployments/${DEPLOYMENT_ID}/statuses" \
            -d "${status_payload}" >/dev/null

      - name: Upload deploy diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: deploy-debug-${{ needs.prepare.outputs.short_sha }}
          path: deploy-debug/
          if-no-files-found: ignore
          retention-days: 14
