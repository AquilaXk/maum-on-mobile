name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest

    outputs:
      android: ${{ steps.filter.outputs.android }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ios: ${{ steps.filter.outputs.ios }}
      javascript: ${{ steps.filter.outputs.javascript }}
      repository: ${{ steps.filter.outputs.repository }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
      ci: ${{ steps.filter.outputs.ci }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          zero_sha="0000000000000000000000000000000000000000"
          head_sha="${HEAD_SHA}"

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${BASE_SHA}"
          elif [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "${zero_sha}" ]]; then
            base_sha="${BEFORE_SHA}"
          else
            base_sha="$(git rev-list --max-parents=0 HEAD)"
          fi

          git diff --name-only "${base_sha}" "${head_sha}" > changed-files.txt
          bash tools/ci/detect-changed-paths.sh changed-files.txt

  repository-contracts:
    name: Repository Contracts
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.repository == 'true' || needs.changes.outputs.docs_only == 'true' || needs.changes.outputs.ci == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Validate whitespace
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          else
            git diff-tree --check --root HEAD
          fi

      - name: Validate CI contracts
        run: node --test tools/ci/*.test.mjs

      - name: Validate issue forms
        run: ruby -e 'require "yaml"; ARGV.each { |f| YAML.load_file(f); puts f }' .github/ISSUE_TEMPLATE/*.yml

      - name: Validate tracked Markdown policy
        shell: bash
        run: |
          set -euo pipefail
          unexpected_markdown="$(git ls-files '*.md' ':!:README.md' ':!:.github/pull_request_template.md')"
          if [[ -n "${unexpected_markdown}" ]]; then
            echo "Unexpected tracked Markdown file:"
            echo "${unexpected_markdown}"
            exit 1
          fi

      - name: Validate local agent docs are not tracked
        shell: bash
        run: |
          set -euo pipefail
          unexpected_agent_files="$(git ls-files AGENTS.md CLAUDE.md GEMINI.md CURSOR.md COPILOT.md docs .codex .claude .cursor .aider .windsurf .ai)"
          if [[ -n "${unexpected_agent_files}" ]]; then
            echo "Unexpected tracked local agent file:"
            echo "${unexpected_agent_files}"
            exit 1
          fi

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Detect backend scaffold
        id: scaffold
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f back/gradlew ]]; then
            chmod +x back/gradlew
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "Backend scaffold not found; skipping backend checks."
          fi

      - name: Set up Java
        if: ${{ steps.scaffold.outputs.present == 'true' }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run backend checks
        if: ${{ steps.scaffold.outputs.present == 'true' }}
        working-directory: back
        run: ./gradlew check --no-daemon

      - name: Run mobile API performance smoke
        if: ${{ steps.scaffold.outputs.present == 'true' }}
        run: bash tools/ci/run-mobile-performance-smoke.sh

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Detect frontend scaffold
        id: scaffold
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f front/pubspec.yaml ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
            echo "stack=flutter" >> "${GITHUB_OUTPUT}"
          elif [[ -f front/package.json ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
            echo "stack=node" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "Frontend scaffold not found; skipping frontend checks."
          fi

      - name: Set up Flutter
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        working-directory: front
        run: flutter pub get

      - name: Run Flutter checks
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        working-directory: front
        shell: bash
        run: |
          set -euo pipefail
          flutter analyze
          flutter test

      - name: Set up Node.js
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'node' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Install frontend dependencies
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'node' }}
        working-directory: front
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Run frontend checks
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'node' }}
        working-directory: front
        shell: bash
        run: |
          set -euo pipefail
          for script in lint test build; do
            if npm pkg get "scripts.${script}" | grep -vq '^{}$'; then
              npm run "${script}"
            else
              echo "npm script '${script}' not found; skipping."
            fi
          done

  android:
    name: Android
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.android == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Detect Android scaffold
        id: scaffold
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f front/pubspec.yaml && -d front/android ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
            echo "stack=flutter" >> "${GITHUB_OUTPUT}"
            echo "working_directory=front" >> "${GITHUB_OUTPUT}"
          elif [[ -f android/gradlew ]]; then
            chmod +x android/gradlew
            echo "present=true" >> "${GITHUB_OUTPUT}"
            echo "stack=gradle" >> "${GITHUB_OUTPUT}"
            echo "working_directory=android" >> "${GITHUB_OUTPUT}"
          elif [[ -f gradlew ]]; then
            chmod +x gradlew
            echo "present=true" >> "${GITHUB_OUTPUT}"
            echo "stack=gradle" >> "${GITHUB_OUTPUT}"
            echo "working_directory=." >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "Android scaffold not found; skipping Android checks."
          fi

      - name: Set up Java
        if: ${{ steps.scaffold.outputs.present == 'true' }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Flutter
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          cache: true

      - name: Run Android release preflight
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        run: tools/ci/run-mobile-release-preflight.sh --platform android

      - name: Build Flutter Android debug app
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        working-directory: front
        shell: bash
        run: |
          set -euo pipefail
          flutter pub get
          flutter build apk --debug

      - name: Set up Node.js
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Validate mobile release contracts
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        run: node --test tools/ci/mobile-release-config-contract.test.mjs

      - name: Run mobile quality gate
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        run: node tools/ci/run-mobile-quality-gate.mjs --platform android --report-dir build/reports/mobile-quality

      - name: Build Flutter Android release appbundle
        if: ${{ github.event_name == 'workflow_dispatch' && steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        env:
          MAUMON_ANDROID_KEYSTORE_BASE64: ${{ secrets.MAUMON_ANDROID_KEYSTORE_BASE64 }}
          MAUMON_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.MAUMON_ANDROID_KEYSTORE_PASSWORD }}
          MAUMON_ANDROID_KEY_ALIAS: ${{ secrets.MAUMON_ANDROID_KEY_ALIAS }}
          MAUMON_ANDROID_KEY_PASSWORD: ${{ secrets.MAUMON_ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          missing=false
          for name in MAUMON_ANDROID_KEYSTORE_BASE64 MAUMON_ANDROID_KEYSTORE_PASSWORD MAUMON_ANDROID_KEY_ALIAS MAUMON_ANDROID_KEY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "Skipping Android release appbundle; missing ${name}."
              missing=true
            fi
          done

          if [[ "${missing}" == "true" ]]; then
            exit 0
          fi

          release_keystore="${RUNNER_TEMP}/maumon-release.keystore"
          printf '%s' "${MAUMON_ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${release_keystore}"
          export MAUMON_ANDROID_KEYSTORE_PATH="${release_keystore}"

          cd front
          flutter build appbundle --release

      - name: Run Android checks
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'gradle' }}
        working-directory: ${{ steps.scaffold.outputs.working_directory }}
        run: ./gradlew check --no-daemon

  ios:
    name: iOS
    runs-on: macos-latest
    needs: changes
    if: ${{ needs.changes.outputs.ios == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Detect iOS scaffold
        id: scaffold
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f front/pubspec.yaml && -d front/ios ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
            echo "stack=flutter" >> "${GITHUB_OUTPUT}"
          elif [[ -d ios ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
            echo "stack=xcode" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "iOS scaffold not found; skipping iOS checks."
          fi

      - name: Set up Flutter
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          cache: true

      - name: Run iOS release preflight
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        run: tools/ci/run-mobile-release-preflight.sh --platform ios

      - name: Build Flutter iOS app
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        working-directory: front
        shell: bash
        run: |
          set -euo pipefail
          flutter pub get
          flutter build ios --simulator --no-codesign

      - name: Set up Node.js
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Validate mobile release contracts
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        run: node --test tools/ci/mobile-release-config-contract.test.mjs

      - name: Run mobile quality gate
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        run: node tools/ci/run-mobile-quality-gate.mjs --platform ios --report-dir build/reports/mobile-quality

      - name: Build Flutter iOS release without code signing
        if: ${{ github.event_name == 'workflow_dispatch' && steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        working-directory: front
        shell: bash
        run: |
          set -euo pipefail
          flutter build ios --no-codesign

      - name: Validate iOS project metadata
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'xcode' }}
        shell: bash
        run: |
          set -euo pipefail
          workspace="$(find ios -maxdepth 4 -name '*.xcworkspace' -print -quit)"
          project="$(find ios -maxdepth 4 -name '*.xcodeproj' -print -quit)"

          if [[ -n "${workspace}" ]]; then
            xcodebuild -list -workspace "${workspace}"
          elif [[ -n "${project}" ]]; then
            xcodebuild -list -project "${project}"
          else
            echo "iOS directory exists, but no Xcode workspace or project was found."
            exit 1
          fi

  javascript:
    name: JavaScript
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.javascript == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Detect JavaScript scaffold
        id: scaffold
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package.json ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "JavaScript scaffold not found; skipping JavaScript checks."
          fi

      - name: Set up Node.js
        if: ${{ steps.scaffold.outputs.present == 'true' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Install dependencies
        if: ${{ steps.scaffold.outputs.present == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Run available JavaScript checks
        if: ${{ steps.scaffold.outputs.present == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          for script in typecheck lint test build; do
            if npm pkg get "scripts.${script}" | grep -vq '^{}$'; then
              npm run "${script}"
            else
              echo "npm script '${script}' not found; skipping."
            fi
          done
