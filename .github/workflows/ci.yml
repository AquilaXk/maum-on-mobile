name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - rc-*
  workflow_dispatch:
    inputs:
      android_release_mode:
        description: "Android release pipeline mode"
        required: true
        default: skip
        type: choice
        options:
          - skip
          - dry-run
          - appbundle
      android_track_submit_mode:
        description: "Android Play testing track submit mode"
        required: true
        default: skip
        type: choice
        options:
          - skip
          - dry-run
          - submit
      android_play_package_name:
        description: "Android package name for Play track submission"
        required: true
        default: com.aquilaxk.maumonmobile
        type: string
      android_play_track:
        description: "Play track id such as internal or alpha"
        required: true
        default: internal
        type: string
      android_play_track_kind:
        description: "Testing track kind"
        required: true
        default: internal
        type: choice
        options:
          - internal
          - closed
      android_play_release_status:
        description: "Play release status"
        required: true
        default: draft
        type: choice
        options:
          - draft
          - completed
          - inProgress
          - halted
      android_play_release_notes:
        description: "Play release notes text"
        required: true
        default: Internal testing build
        type: string
      android_play_tester_groups:
        description: "Comma-separated Google Groups for testing tracks"
        required: false
        type: string
      android_play_tester_emails:
        description: "Comma-separated tester emails for evidence"
        required: false
        type: string
      android_play_closed_test_start_date:
        description: "Closed test start date in YYYY-MM-DD"
        required: false
        type: string
      android_play_closed_test_participant_count:
        description: "Closed test participant count"
        required: false
        type: string
      android_play_closed_test_feedback_url:
        description: "Closed test feedback collection URL"
        required: false
        type: string
      android_play_production_access_status:
        description: "Production access request status"
        required: false
        default: not_requested
        type: string
      ios_release_mode:
        description: "iOS release pipeline mode"
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - archive
          - upload
      release_candidate_device_matrix_mode:
        description: "Release candidate physical-device evidence gate"
        required: true
        default: skip
        type: choice
        options:
          - skip
          - validate
      release_device_matrix_results_dir:
        description: "Directory containing release-device-matrix-<platform>-results.json"
        required: true
        default: contracts/release-candidate/results
        type: string
      release_candidate_security_gate_mode:
        description: "Release candidate security and supply-chain gate"
        required: true
        default: skip
        type: choice
        options:
          - skip
          - validate
      release_security_audit_results_dir:
        description: "Directory containing <ecosystem>-audit.json security results"
        required: true
        default: contracts/security-release/audits
        type: string
      release_candidate_privacy_gate_mode:
        description: "Release candidate privacy lifecycle evidence gate"
        required: true
        default: skip
        type: choice
        options:
          - skip
          - validate
      release_privacy_evidence_results_dir:
        description: "Directory containing privacy lifecycle runtime evidence results"
        required: true
        default: contracts/privacy/runtime-evidence
        type: string
      release_candidate_ops_gate_mode:
        description: "Release candidate operations observability evidence gate"
        required: true
        default: skip
        type: choice
        options:
          - skip
          - validate
      release_ops_evidence_results_dir:
        description: "Directory containing operations observability runtime evidence results"
        required: true
        default: contracts/ops/runtime-evidence
        type: string
      release_candidate_deploy_gate_mode:
        description: "Release candidate production deploy and recovery evidence gate"
        required: true
        default: skip
        type: choice
        options:
          - skip
          - validate
      release_deploy_evidence_results_dir:
        description: "Directory containing production deploy runtime evidence results"
        required: true
        default: contracts/infra/runtime-evidence
        type: string
      release_deploy_compatibility_manifest:
        description: "JSON with backendVersion, androidVersion, iosVersion, apiContractVersion"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest

    outputs:
      android: ${{ steps.filter.outputs.android }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ios: ${{ steps.filter.outputs.ios }}
      javascript: ${{ steps.filter.outputs.javascript }}
      repository: ${{ steps.filter.outputs.repository }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
      ci: ${{ steps.filter.outputs.ci }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          zero_sha="0000000000000000000000000000000000000000"
          head_sha="${HEAD_SHA}"

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${BASE_SHA}"
          elif [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "${zero_sha}" ]]; then
            base_sha="${BEFORE_SHA}"
          else
            base_sha="$(git rev-list --max-parents=0 HEAD)"
          fi

          git diff --name-only "${base_sha}" "${head_sha}" > changed-files.txt
          bash tools/ci/detect-changed-paths.sh changed-files.txt

  repository-contracts:
    name: Repository Contracts
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.repository == 'true' || needs.changes.outputs.docs_only == 'true' || needs.changes.outputs.ci == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Validate whitespace
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          else
            git diff-tree --check --root HEAD
          fi

      - name: Validate CI contracts
        run: node --test tools/ci/*.test.mjs

      - name: Validate issue forms
        run: ruby -e 'require "yaml"; ARGV.each { |f| YAML.load_file(f); puts f }' .github/ISSUE_TEMPLATE/*.yml

      - name: Validate tracked Markdown policy
        shell: bash
        run: |
          set -euo pipefail
          unexpected_markdown="$(git ls-files '*.md' ':!:README.md' ':!:.github/pull_request_template.md')"
          if [[ -n "${unexpected_markdown}" ]]; then
            echo "Unexpected tracked Markdown file:"
            echo "${unexpected_markdown}"
            exit 1
          fi

      - name: Validate local agent docs are not tracked
        shell: bash
        run: |
          set -euo pipefail
          unexpected_agent_files="$(git ls-files AGENTS.md CLAUDE.md GEMINI.md CURSOR.md COPILOT.md docs .codex .claude .cursor .aider .windsurf .ai)"
          if [[ -n "${unexpected_agent_files}" ]]; then
            echo "Unexpected tracked local agent file:"
            echo "${unexpected_agent_files}"
            exit 1
          fi

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Detect backend scaffold
        id: scaffold
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f back/gradlew ]]; then
            chmod +x back/gradlew
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "Backend scaffold not found; skipping backend checks."
          fi

      - name: Set up Java
        if: ${{ steps.scaffold.outputs.present == 'true' }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run backend checks
        if: ${{ steps.scaffold.outputs.present == 'true' }}
        working-directory: back
        run: ./gradlew check --no-daemon

      - name: Run mobile API performance smoke
        if: ${{ steps.scaffold.outputs.present == 'true' }}
        run: bash tools/ci/run-mobile-performance-smoke.sh

      - name: Upload mobile performance smoke report
        if: ${{ steps.scaffold.outputs.present == 'true' && !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: mobile-performance-smoke
          path: build/reports/mobile-performance/mobile-performance-smoke.json
          if-no-files-found: error
          retention-days: 3

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Detect frontend scaffold
        id: scaffold
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f front/pubspec.yaml ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
            echo "stack=flutter" >> "${GITHUB_OUTPUT}"
          elif [[ -f front/package.json ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
            echo "stack=node" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "Frontend scaffold not found; skipping frontend checks."
          fi

      - name: Set up Flutter
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        working-directory: front
        run: flutter pub get

      - name: Run Flutter checks
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        working-directory: front
        shell: bash
        run: |
          set -euo pipefail
          flutter analyze
          flutter test

      - name: Set up Node.js
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'node' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Install frontend dependencies
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'node' }}
        working-directory: front
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Run frontend checks
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'node' }}
        working-directory: front
        shell: bash
        run: |
          set -euo pipefail
          for script in lint test build; do
            if npm pkg get "scripts.${script}" | grep -vq '^{}$'; then
              npm run "${script}"
            else
              echo "npm script '${script}' not found; skipping."
            fi
          done

  android:
    name: Android
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.android == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Detect Android scaffold
        id: scaffold
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f front/pubspec.yaml && -d front/android ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
            echo "stack=flutter" >> "${GITHUB_OUTPUT}"
            echo "working_directory=front" >> "${GITHUB_OUTPUT}"
          elif [[ -f android/gradlew ]]; then
            chmod +x android/gradlew
            echo "present=true" >> "${GITHUB_OUTPUT}"
            echo "stack=gradle" >> "${GITHUB_OUTPUT}"
            echo "working_directory=android" >> "${GITHUB_OUTPUT}"
          elif [[ -f gradlew ]]; then
            chmod +x gradlew
            echo "present=true" >> "${GITHUB_OUTPUT}"
            echo "stack=gradle" >> "${GITHUB_OUTPUT}"
            echo "working_directory=." >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "Android scaffold not found; skipping Android checks."
          fi

      - name: Set up Java
        if: ${{ steps.scaffold.outputs.present == 'true' }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Flutter
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          cache: true

      - name: Run Android release preflight
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        run: tools/ci/run-mobile-release-preflight.sh --platform android

      - name: Build Flutter Android debug app
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        working-directory: front
        shell: bash
        run: |
          set -euo pipefail
          flutter pub get
          flutter build apk --debug

      - name: Set up Node.js
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Validate mobile release contracts
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        run: node --test tools/ci/mobile-release-config-contract.test.mjs

      - name: Run mobile quality gate
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        run: node tools/ci/run-mobile-quality-gate.mjs --platform android --report-dir build/reports/mobile-quality

      - name: Build Flutter Android release appbundle
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.android_release_mode != 'skip' && steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        env:
          MAUMON_ANDROID_RELEASE_DRY_RUN: ${{ inputs.android_release_mode == 'dry-run' }}
          MAUMON_ANDROID_KEYSTORE_BASE64: ${{ secrets.MAUMON_ANDROID_KEYSTORE_BASE64 }}
          MAUMON_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.MAUMON_ANDROID_KEYSTORE_PASSWORD }}
          MAUMON_ANDROID_KEY_ALIAS: ${{ secrets.MAUMON_ANDROID_KEY_ALIAS }}
          MAUMON_ANDROID_KEY_PASSWORD: ${{ secrets.MAUMON_ANDROID_KEY_PASSWORD }}
          MAUMON_FIREBASE_APP_ID: ${{ secrets.MAUMON_FIREBASE_APP_ID }}
          MAUMON_FIREBASE_PROJECT_ID: ${{ secrets.MAUMON_FIREBASE_PROJECT_ID }}
          MAUMON_FIREBASE_API_KEY: ${{ secrets.MAUMON_FIREBASE_API_KEY }}
          MAUMON_FIREBASE_SENDER_ID: ${{ secrets.MAUMON_FIREBASE_SENDER_ID }}
        shell: bash
        run: bash tools/ci/run-android-release-appbundle.sh

      - name: Require Android appbundle for Play submit
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.android_track_submit_mode == 'submit' && inputs.android_release_mode != 'appbundle' }}
        shell: bash
        run: |
          echo "Android Play submit mode requires android_release_mode=appbundle so a signed AAB exists."
          exit 1

      - name: Submit Android Play testing track or dry run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.android_track_submit_mode != 'skip' && steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        env:
          MAUMON_PLAY_RELEASE_DRY_RUN: ${{ inputs.android_track_submit_mode == 'dry-run' }}
          MAUMON_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.MAUMON_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
          MAUMON_PLAY_PACKAGE_NAME: ${{ inputs.android_play_package_name }}
          MAUMON_PLAY_TRACK: ${{ inputs.android_play_track }}
          MAUMON_PLAY_TRACK_KIND: ${{ inputs.android_play_track_kind }}
          MAUMON_PLAY_RELEASE_STATUS: ${{ inputs.android_play_release_status }}
          MAUMON_PLAY_RELEASE_NOTES: ${{ inputs.android_play_release_notes }}
          MAUMON_RELEASE_MANIFEST_PATH: contracts/release-manifest/current-release.json
          MAUMON_PLAY_TESTER_GROUPS: ${{ inputs.android_play_tester_groups }}
          MAUMON_PLAY_TESTER_EMAILS: ${{ inputs.android_play_tester_emails }}
          MAUMON_PLAY_CLOSED_TEST_START_DATE: ${{ inputs.android_play_closed_test_start_date }}
          MAUMON_PLAY_CLOSED_TEST_PARTICIPANT_COUNT: ${{ inputs.android_play_closed_test_participant_count }}
          MAUMON_PLAY_CLOSED_TEST_FEEDBACK_URL: ${{ inputs.android_play_closed_test_feedback_url }}
          MAUMON_PLAY_PRODUCTION_ACCESS_STATUS: ${{ inputs.android_play_production_access_status }}
        run: node tools/ci/run-android-play-track-submit.mjs

      - name: Run Android checks
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'gradle' }}
        working-directory: ${{ steps.scaffold.outputs.working_directory }}
        run: ./gradlew check --no-daemon

  ios:
    name: iOS
    runs-on: macos-latest
    needs: changes
    if: ${{ needs.changes.outputs.ios == 'true' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Detect iOS scaffold
        id: scaffold
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f front/pubspec.yaml && -d front/ios ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
            echo "stack=flutter" >> "${GITHUB_OUTPUT}"
          elif [[ -d ios ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
            echo "stack=xcode" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "iOS scaffold not found; skipping iOS checks."
          fi

      - name: Select Xcode 26
        id: xcode
        if: ${{ steps.scaffold.outputs.present == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          candidates=(
            "/Applications/Xcode_26.5.app/Contents/Developer"
            "/Applications/Xcode_26.4.app/Contents/Developer"
            "/Applications/Xcode_26.app/Contents/Developer"
            "/Applications/Xcode.app/Contents/Developer"
          )

          selected=""
          for developer_dir in "${candidates[@]}"; do
            if [[ -x "${developer_dir}/usr/bin/xcodebuild" ]]; then
              version_output="$("${developer_dir}/usr/bin/xcodebuild" -version)"
              version="$(printf '%s\n' "${version_output}" | sed -n '1p')"
              if [[ "${version}" == Xcode\ 26* ]]; then
                sudo xcode-select -s "${developer_dir}"
                selected="${developer_dir}"
                break
              fi
            fi
          done

          if [[ -z "${selected}" ]]; then
            echo "::warning::Xcode 26 is required for iOS archive/upload builds, but it is not installed on this runner."
          fi

          selected_version_output="$(xcodebuild -version || true)"
          selected_version="$(printf '%s\n' "${selected_version_output}" | sed -n '1p')"
          echo "version=${selected_version}" >> "${GITHUB_OUTPUT}"
          if [[ "${selected_version}" == Xcode\ 26* ]]; then
            echo "xcode26=true" >> "${GITHUB_OUTPUT}"
          else
            echo "xcode26=false" >> "${GITHUB_OUTPUT}"
          fi

          printf '%s\n' "${selected_version_output}"
          xcrun --sdk iphoneos --show-sdk-version || true

      - name: Require Xcode 26 for iOS archive or upload
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ios_release_mode != 'dry-run' && steps.xcode.outputs.xcode26 != 'true' }}
        shell: bash
        run: |
          echo "Xcode 26 is required for iOS archive/upload builds."
          echo "Selected Xcode: ${{ steps.xcode.outputs.version }}"
          exit 1

      - name: Set up Flutter
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          cache: true

      - name: Install iOS Ruby dependencies
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        working-directory: front/ios
        shell: bash
        run: |
          set -euo pipefail
          gem install bundler -v 2.4.22 --no-document
          bundle _2.4.22_ config set --local path vendor/bundle
          bundle _2.4.22_ install --jobs 4 --retry 3

      - name: Run iOS release preflight
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        run: tools/ci/run-mobile-release-preflight.sh --platform ios

      - name: Build Flutter iOS app
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        working-directory: front
        shell: bash
        run: |
          set -euo pipefail
          ../tools/flutterw pub get
          ../tools/flutterw build ios --simulator --no-codesign

      - name: Set up Node.js
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Validate mobile release contracts
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        run: node --test tools/ci/mobile-release-config-contract.test.mjs

      - name: Run mobile quality gate
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        run: node tools/ci/run-mobile-quality-gate.mjs --platform ios --report-dir build/reports/mobile-quality

      - name: Build iOS TestFlight archive or dry run
        if: ${{ github.event_name == 'workflow_dispatch' && steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'flutter' }}
        env:
          MAUMON_IOS_RELEASE_DRY_RUN: ${{ inputs.ios_release_mode == 'dry-run' }}
          MAUMON_IOS_TESTFLIGHT_UPLOAD: ${{ inputs.ios_release_mode == 'upload' }}
          MAUMON_RELEASE_MANIFEST_PATH: contracts/release-manifest/current-release.json
          MAUMON_IOS_DEVELOPMENT_TEAM: ${{ secrets.MAUMON_IOS_DEVELOPMENT_TEAM }}
          MAUMON_IOS_EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.MAUMON_IOS_EXPORT_OPTIONS_PLIST_BASE64 }}
          MAUMON_IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MAUMON_IOS_PROVISIONING_PROFILE_BASE64 }}
          MAUMON_IOS_CERTIFICATE_P12_BASE64: ${{ secrets.MAUMON_IOS_CERTIFICATE_P12_BASE64 }}
          MAUMON_IOS_CERTIFICATE_PASSWORD: ${{ secrets.MAUMON_IOS_CERTIFICATE_PASSWORD }}
          MAUMON_IOS_KEYCHAIN_PASSWORD: ${{ secrets.MAUMON_IOS_KEYCHAIN_PASSWORD }}
          MAUMON_APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.MAUMON_APP_STORE_CONNECT_API_KEY_ID }}
          MAUMON_APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.MAUMON_APP_STORE_CONNECT_API_ISSUER_ID }}
          MAUMON_APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.MAUMON_APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
        shell: bash
        run: bash tools/ci/run-ios-testflight-archive.sh

      - name: Validate iOS project metadata
        if: ${{ steps.scaffold.outputs.present == 'true' && steps.scaffold.outputs.stack == 'xcode' }}
        shell: bash
        run: |
          set -euo pipefail
          workspace="$(find ios -maxdepth 4 -name '*.xcworkspace' -print -quit)"
          project="$(find ios -maxdepth 4 -name '*.xcodeproj' -print -quit)"

          if [[ -n "${workspace}" ]]; then
            xcodebuild -list -workspace "${workspace}"
          elif [[ -n "${project}" ]]; then
            xcodebuild -list -project "${project}"
          else
            echo "iOS directory exists, but no Xcode workspace or project was found."
            exit 1
          fi

  javascript:
    name: JavaScript
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.javascript == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Detect JavaScript scaffold
        id: scaffold
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package.json ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "JavaScript scaffold not found; skipping JavaScript checks."
          fi

      - name: Set up Node.js
        if: ${{ steps.scaffold.outputs.present == 'true' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Install dependencies
        if: ${{ steps.scaffold.outputs.present == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Run available JavaScript checks
        if: ${{ steps.scaffold.outputs.present == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          for script in typecheck lint test build; do
            if npm pkg get "scripts.${script}" | grep -vq '^{}$'; then
              npm run "${script}"
            else
              echo "npm script '${script}' not found; skipping."
            fi
          done

